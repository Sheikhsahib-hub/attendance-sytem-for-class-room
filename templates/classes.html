{% extends "base.html" %}
{% block title %}Classes – AttendPro{% endblock %}
{% block page_title %}Classes{% endblock %}
{% set active = 'classes' %}

{% block topbar_actions %}
  <button class="btn btn-primary" onclick="openModal('addClassModal')">➕ Add Class</button>
{% endblock %}

{% block content %}
<div id="classesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;">
  <div class="empty-state"><div class="empty-state-icon">🏫</div><div class="empty-state-text">Loading…</div></div>
</div>

<!-- Add Class Modal -->
<div class="modal-backdrop" id="addClassModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">➕ Add Class</span>
      <button class="modal-close" onclick="closeModal('addClassModal')">✕</button>
    </div>
    <form id="addClassForm">
      <div class="form-group">
        <label class="form-label">Class Name *</label>
        <input class="form-control" type="text" name="name" required placeholder="e.g. Class A"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" name="description" placeholder="e.g. Grade 9 – Section A"/>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('addClassModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Class</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Class Modal -->
<div class="modal-backdrop" id="editClassModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Class</span>
      <button class="modal-close" onclick="closeModal('editClassModal')">✕</button>
    </div>
    <form id="editClassForm">
      <input type="hidden" id="editClassId"/>
      <div class="form-group">
        <label class="form-label">Class Name *</label>
        <input class="form-control" type="text" id="editClassName" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" id="editClassDesc"/>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('editClassModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const colors = ['#6c63ff','#00d4ff','#22c55e','#f59e0b','#f43f5e','#8b5cf6','#06b6d4'];
const icons  = ['🏫','📚','✏️','🎒','🖊️','📓','🏆'];

async function loadClasses() {
  const classes = await api('/api/classes');
  const grid    = document.getElementById('classesGrid');
  if (!classes.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏫</div><div class="empty-state-text">No classes yet. Click "Add Class" to get started.</div></div>`;
    return;
  }
  grid.innerHTML = classes.map((c, i) => {
    const color = colors[i % colors.length];
    const icon  = icons[i % icons.length];
    return `
    <div class="card" style="border-top:3px solid ${color};">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="width:46px;height:46px;background:${color}22;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;">${icon}</div>
        <div>
          <div style="font-size:16px;font-weight:700;">${c.name}</div>
          <div style="font-size:12px;color:var(--text-muted);">${c.description || 'No description'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="text-align:center;">
          <div style="font-size:24px;font-weight:700;color:${color};">${c.student_count}</div>
          <div style="font-size:11px;color:var(--text-muted);">Students</div>
        </div>
        <div style="display:flex;gap:8px;">
          <a href="/attendance?class_id=${c.id}" class="btn btn-success btn-sm">✅ Attendance</a>
          <a href="/students?class_id=${c.id}" class="btn btn-outline btn-sm">👤 Students</a>
        </div>
      </div>
      <div style="display:flex;gap:8px;border-top:1px solid var(--border);padding-top:14px;">
        <button class="btn btn-outline btn-sm" style="flex:1;" onclick='openEditClass(${JSON.stringify(c)})'>✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteClass(${c.id}, '${c.name.replace(/'/g,"\\'")}')">🗑️ Delete</button>
      </div>
    </div>`;
  }).join('');
}

function openEditClass(c) {
  document.getElementById('editClassId').value   = c.id;
  document.getElementById('editClassName').value = c.name;
  document.getElementById('editClassDesc').value = c.description || '';
  openModal('editClassModal');
}

document.getElementById('addClassForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await api('/api/classes', 'POST', Object.fromEntries(fd));
  if (res.error) { showToast(res.error, 'error'); return; }
  showToast('Class created!', 'success');
  closeModal('addClassModal');
  e.target.reset();
  loadClasses();
});

document.getElementById('editClassForm').addEventListener('submit', async e => {
  e.preventDefault();
  const id   = document.getElementById('editClassId').value;
  const name = document.getElementById('editClassName').value;
  const desc = document.getElementById('editClassDesc').value;
  const res  = await api(`/api/classes/${id}`, 'PUT', {name, description: desc});
  if (res.error) { showToast(res.error, 'error'); return; }
  showToast('Class updated!', 'success');
  closeModal('editClassModal');
  loadClasses();
});

async function deleteClass(id, name) {
  if (!confirm(`Delete class "${name}"?\n\nThis will also delete all students and attendance records in this class.`)) return;
  await api(`/api/classes/${id}`, 'DELETE');
  showToast('Class deleted.', 'info');
  loadClasses();
}

loadClasses();
</script>
{% endblock %}
