<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – AttendPro</title>
  <meta name="description" content="Login to AttendPro Student Attendance Management System"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🎓</div>
      <h1 class="login-title">AttendPro</h1>
      <p class="login-subtitle">Student Attendance Management System</p>
    </div>

    {% if error %}
    <div class="error-alert">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username"
               placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button class="login-btn" type="submit" id="loginBtn">Sign In</button>
    </form>

    <p class="login-hint">
      Demo: <code>admin</code> / <code>admin123</code> &nbsp;|&nbsp;
      <code>teacher1</code> / <code>teacher123</code>
    </p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
  });
</script>
</body>
</html>
